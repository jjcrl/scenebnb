<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scene BnB 🎬 Where Every Stay Tells A Story.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
   <nav class="navbar navbar-light bg-white px-4">
    <div class="d-flex w-100 align-items-center">
        <a class="navbar-brand ms-3 text-muted" href="/spaces" style="font-size: 2rem;">scenebnb</a>
        <div class="ms-auto mb-auto pt-3">
            {% if session["user_id"] %}
                <a class="btn btn-dark btn-md me-4" style="font-weight:bolder;"" href="/spaces/new">List A Space Today ➡️ </a>
                <a class="btn btn-outline-secondary btn-md me-3" href="/index">Profile 👤 </a>
                <a class="btn btn-outline-secondary btn-md me-2" href="/logout">Log out 📤 </a>
            {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="/sessions/new">Log in</a>
                <a class="btn btn-light btn-sm" href="/users/new">Sign up</a>
            {% endif %}
        </div>
    </div>
</nav>

    <div class="container mt-4 pb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        {% block scripts %}{% endblock %}

</body>
</html>
