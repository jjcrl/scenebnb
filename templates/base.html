<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SceneBnB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand fw-bold" href="/index">SceneBnB 🎬</a>
        <div>
            {% if session["user_id"] %}
                <span class="text-white me-3">Hi, {{ session["name"] }}</span>
                <a class="btn btn-outline-light btn-sm me-2" href="/index">Profile</a>
                <a class="btn btn-outline-light btn-sm me-2" href="/spaces/new">List a Space</a>
                <a class="btn btn-light btn-sm" href="/logout">Log out</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm me-2" href="/sessions/new">Log in</a>
                <a class="btn btn-light btn-sm" href="/users/new">Sign up</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        {% block scripts %}{% endblock %}

</body>
</html>
