{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Available Spaces</h2>
    <a href="/spaces/new" class="btn btn-dark">+ List Your Space</a>
</div>

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for space in spaces %}
    <div class="col">
    <div class="card h-100 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">{{ space.title }}</h5>
            <h6 class="card-subtitle mb-2 text-muted">{{ space.location }}</h6>
            <p class="card-text">{{ space.description }}</p>
            <span class="badge bg-secondary">{{ space.tv_show }}</span>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center">
            <strong>£{{ space.price }} / night</strong>
            <a href="/spaces/{{ space.id }}" class="btn btn-sm btn-outline-dark">View</a>
        </div>
    </div>
</div>
    {% endfor %}
</div>

{% endblock %}
