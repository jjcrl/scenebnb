{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">Log In</h2>

                <form method="POST" action="/sessions">
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" name="email_address" placeholder="you@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="Password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">Log In</button>
                    </div>
                </form>

                <p class="text-center mt-3 text-muted">Don't have an account? <a href="/users/new">Sign up</a></p>
            </div>
        </div>
    </div>
</div>

{% endblock %}
