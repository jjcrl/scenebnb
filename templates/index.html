<!doctype html>
<html>
  <head>
    <title>MakersBnB</title>

    <!--
            Head to https://github.com/makersacademy/web-applications-in-python/blob/main/pills/loading_css_or_static_files.md
            If you're wondering how the CSS file below is being loaded.
        -->
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <p>Your homepage.</p>
    <h1>{{ your_spaces }}</h1>
    <h1>{{ bookings }}</h1>
    {% for space in your_spaces %} {% for booking in space.bookings %}
    <h1>
      {{ booking.requester_name }} wants to book {{ booking.space_title }} on {{
      booking.date }} - {{ booking.status }}
    </h1>
    <form method="POST" action="/bookings/{{ booking.id }}/confirm">
        <button type="submit">confirm</button>
    </form>
    <form method="POST" action="/bookings/{{ booking.id }}/deny">
        <button type="submit">deny</button>
    </form>
    {% endfor %} {% endfor %}
  </body>
</html>
