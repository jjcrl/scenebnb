{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h2 class="card-title mb-4">List a Space</h2>

                <form method="POST" action="/spaces">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" placeholder="Name your space" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" name="location" placeholder="Where is it?" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price per night (£)</label>
                        <input type="number" class="form-control" name="price" placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="Tell us about your space" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">TV Show / Film</label>
                        <input type="text" class="form-control" name="tv_show" placeholder="e.g. Peaky Blinders" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Available From</label>
                        <input type="date" class="form-control" name="available_from" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Available To</label>
                        <input type="date" class="form-control" name="available_to" required>
                    </div>
                    <input type="hidden" name="user_id" value="{{ session['user_id'] }}">
                    <div class="d-grid">
                        <button type="submit" class="btn btn-dark">List Your Space</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
